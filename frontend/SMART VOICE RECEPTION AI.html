/* LIGHT */
.light-mode{
  --bg:#f4f6fb;--bg2:#ffffff;--bg3:#eef0f8;
  --card:#ffffff;--border:rgba(0,0,0,0.07);
  --text:#1a1d2e;--text2:#5a5f80;--text3:#a0a5c0;

}

  --card:#1e2238;--border:rgba(255,255,255,0.07);
  --text:#e8eaff;--text2:#8890bb;--text3:#50558a;
  --nav-bg:#13162a;--nav-shadow:0 1px 0 rgba(255,255,255,0.04);
}
html{background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--grad);border-radius:3px;}

.card-shadow{box-shadow:0 2px 16px rgba(0,0,0,0.07),0 1px 4px rgba(0,0,0,0.04);}
.dark-mode .card-shadow{box-shadow:0 2px 16px rgba(0,0,0,0.4);}

@keyframes ring{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.6);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@keyframes wave{0%,100%{height:6px}50%{height:30px}}

/* ══ ORDERS ═══════════════════════════════════════════════ */
const Orders = () => {
  const [filter,setFilter]=useState('all');
  const [orders,setOrders]=useState(ORDERS);
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');

  const filtered=orders.filter(o=>{
    if(filter!=='all'&&o.status!==filter) return false;
    if(search&&!o.customer.includes(search)&&!o.id.includes(search)) return false;
    return true;
  });
  const upd=(id,status)=>{setOrders(os=>os.map(o=>o.id===id?{...o,status}:o));if(selected?.id===id)setSelected(s=>({...s,status}));};
  const tabs=[['all','الكل',null],['active','نشط','#2196f3'],['preparing','قيد التحضير','#f59e0b'],['ready','جاهز','#00b96b'],['delivered','تم التوصيل','#9898b2'],['cancelled','ملغي','#ef4444']];

  return (
    <div style={{paddingTop:62,minHeight:'100vh',display:'grid',gridTemplateColumns:'1fr 360px',gap:16,maxWidth:1360,margin:'0 auto',padding:'74px 20px 20px'}}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>

          <h2 className="heading" style={{fontSize:21,fontWeight:800,color:'var(--text)',flex:1}}>إدارة الطلبات</h2>

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#2196f3",
  "secondaryColor": "#764ba2",
  "roundness": 4,
  "fontScale": 0.8
}/*EDITMODE-END*/;

const App = () => {
  const [auth,setAuth]=useState(()=>localStorage.getItem('svr_auth')==='1');
  const [page,setPage]=useState(()=>localStorage.getItem('svr_page')||'landing');
  const [dark,setDark]=useState(()=>localStorage.getItem('svr_dark')==='true');
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [showTweaks,setShowTweaks]=useState(false);

  useEffect(()=>{
    document.body.className=dark?'dark-mode':'light-mode';
    localStorage.setItem('svr_dark',dark);
  },[dark]);
  useEffect(()=>{localStorage.setItem('svr_page',page);},[page]);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const setTweak=(k,v)=>{
    setTweaks(t=>({...t,[k]:v}));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };

  const logout=()=>{localStorage.removeItem('svr_auth');setAuth(false);};
  const pages={landing:<Landing setPage={setPage}/>,call:<CallInterface/>,orders:<Orders/>,dashboard:<Dashboard/>,analytics:<Analytics/>};

  if(!auth) return <div style={{'--p1':tweaks.accentColor,'--p2':tweaks.secondaryColor,'--grad':`linear-gradient(135deg,${tweaks.accentColor},${tweaks.secondaryColor})`}}><Login onLogin={()=>setAuth(true)}/></div>;

  return(
    <div style={{'--p1':tweaks.accentColor,'--p2':tweaks.secondaryColor,'--grad':`linear-gradient(135deg,${tweaks.accentColor},${tweaks.secondaryColor})`,fontSize:`${tweaks.fontScale}rem`}}>
      <Nav page={page} setPage={setPage} dark={dark} setDark={setDark} onLogout={logout}/>
      <div key={page} style={{animation:'fadeUp .3s ease'}}>{pages[page]}</div>

      {showTweaks&&(
        <div style={{position:'fixed',bottom:20,left:20,background:'var(--card)',border:'1px solid var(--border)',borderRadius:18,padding:22,width:270,zIndex:999,boxShadow:'0 20px 60px rgba(0,0,0,.18)',animation:'fadeUp .3s ease'}}>
          <div className="heading" style={{fontWeight:700,color:'var(--text)',marginBottom:18,fontSize:14}}>⚙️ Tweaks</div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11.5,color:'var(--text3)',marginBottom:7,fontWeight:600}}>اللون الرئيسي</div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              {['#2196f3','#667eea','#e91e63','#009688','#ff5722'].map(c=>(
                <div key={c} onClick={()=>setTweak('accentColor',c)} style={{width:26,height:26,borderRadius:7,background:c,cursor:'pointer',border:`2.5px solid ${tweaks.accentColor===c?'var(--text)':'transparent'}`,transition:'border .15s'}}/>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11.5,color:'var(--text3)',marginBottom:7,fontWeight:600}}>اللون الثانوي</div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              {['#764ba2','#3f51b5','#880e4f','#00695c','#e65100'].map(c=>(
                <div key={c} onClick={()=>setTweak('secondaryColor',c)} style={{width:26,height:26,borderRadius:7,background:c,cursor:'pointer',border:`2.5px solid ${tweaks.secondaryColor===c?'var(--text)':'transparent'}`,transition:'border .15s'}}/>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11.5,color:'var(--text3)',marginBottom:6,fontWeight:600}}>حجم الخط: {tweaks.fontScale.toFixed(1)}×</div>
            <input type="range" min="0.7" max="1.2" step="0.05" value={tweaks.fontScale} onChange={e=>setTweak('fontScale',+e.target.value)} style={{width:'100%',accentColor:'var(--p1)'}}/>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
