document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

B, U+1EE4D-1EE4F, U+1EE51-1EE52, U+1EE54, U+1EE57, U+1EE59, U+1EE5B, U+1EE5D, U+1EE5F, U+1EE61-1EE62, U+1EE64, U+1EE67-1EE6A, U+1EE6C-1EE72, U+1EE74-1EE77, U+1EE79-1EE7C, U+1EE7E, U+1EE80-1EE89, U+1EE8B-1EE9B, U+1EEA1-1EEA3, U+1EEA5-1EEA9, U+1EEAB-1EEBB, U+1EEF0-1EEF1;\n}\n/* latin */\n@font-face {\n  font-family: 'Tajawal';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"62478357-ba90-4f4a-b9f4-51861df15ed1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{margin:0;padding:0;box-sizing:border-box;}\nbody{font-family:'Tajawal',sans-serif;direction:rtl;background:#f4f6fb;color:#1a1d2e;line-height:1.7;}\nh1,h2,h3,.heading{font-family:'Cairo',sans-serif;}\ncode,pre{font-family:'JetBrains Mono',monospace;direction:ltr;text-align:left;}\n\n/* Layout */\n.sidebar{position:fixed;right:0;top:0;bottom:0;width:260px;background:#fff;border-left:1px solid #e8eaf0;padding:24px 0;overflow-y:auto;z-index:100;box-shadow:-2px 0 12px rgba(0,0,0,.05);}\n.main{margin-right:260px;padding:40px 48px;max-width:960px;}\n\n/* Logo bar */\n.logo-bar{padding:0 20px 20px;border-bottom:1px solid #f0f0f8;margin-bottom:16px;display:flex;align-items:center;gap:10;}\n.logo-box{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2196f3,#764ba2);display:flex;align-items:center;justify-content:center;}\n\n/* Nav */\n.nav-section{padding:8px 20px;font-size:10.5px;font-weight:700;color:#a0a5c0;letter-spacing:1px;text-transform:uppercase;margin-top:8px;}\n.nav-item{display:flex;align-items:center;gap:8px;padding:8px 20px;font-size:13px;color:#52526e;cursor:pointer;transition:all .2s;text-decoration:none;border-right:3px solid transparent;}\n.nav-item:hover{background:#f4f6fb;color:#2196f3;}\n.nav-item.active{background:rgba(33,150,243,.08);color:#2196f3;border-right-color:#2196f3;font-weight:700;}\n.nav-item .step-num{width:20px;height:20px;border-radius:6px;background:#f0f0f8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}\n.nav-item.active .step-num{background:#2196f3;color:#fff;}\n.nav-item.done .step-num{background:#00b96b;color:#fff;}\n\n/* Content */\n.section{padding:48px 0;border-bottom:1px solid #e8eaf0;}\n.section:last-child{border-bottom:none;}\n.section-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;}\n.step-badge{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:'Cairo';flex-shrink:0;}\n.section h2{font-size:22px;font-weight:900;color:#1a1d2e;margin-bottom:4px;}\n.section .subtitle{font-size:13.5px;color:#7070a0;}\n\n/* Cards */\n.card{background:#fff;border-radius:14px;padding:20px 24px;border:1px solid #e8eaf0;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.05);}\n.card-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}\n\n/* Steps */\n.step{display:flex;gap:16px;margin-bottom:20px;}\n.step-dot{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#2196f3,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px;}\n.step-body{flex:1;}\n.step-body strong{font-size:14px;color:#1a1d2e;display:block;margin-bottom:4px;}\n.step-body p{font-size:13px;color:#52526e;}\n.step-body a{color:#2196f3;font-weight:600;text-decoration:none;}\n.step-body a:hover{text-decoration:underline;}\n\n/* Code block */\n.code-block{background:#0d1117;border-radius:12px;overflow:hidden;margin:14px 0;}\n.code-header{background:#161b22;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;}\n.code-lang{font-size:11px;font-weight:600;color:#8b949e;letter-spacing:.5px;}\n.copy-btn{font-size:11px;color:#8b949e;background:none;border:1px solid #30363d;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:'Tajawal';transition:all .2s;}\n.copy-btn:hover{background:#21262d;color:#e6edf3;}\n.copy-btn.copied{color:#00b96b;border-color:#00b96b;}\npre{padding:20px 22px;overflow-x:auto;font-size:12.5px;line-height:1.7;color:#e6edf3;}\n.kw{color:#ff7b72;}\n.fn{color:#79c0ff;}\n.st{color:#a5d6ff;}\n.cm{color:#8b949e;font-style:italic;}\n.num{color:#79c0ff;}\n.var{color:#ffa657;}\n\n/* Badges */\n.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}\n.badge-blue{background:rgba(33,150,243,.1);color:#2196f3;}\n.badge-green{background:rgba(0,185,107,.1);color:#00b96b;}\n.badge-purple{background:rgba(118,75,162,.1);color:#764ba2;}\n.badge-orange{background:rgba(245,158,11,.1);color:#f59e0b;}\n.badge-red{background:rgba(239,68,68,.1);color:#ef4444;}\n\n/* Arch diagram */\n.arch{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;padding:28px 0;row-gap:16px;}\n.arch-node{background:#fff;border-radius:14px;padding:14px 16px;border:1.5px solid #e8eaf0;text-align:center;min-width:110px;box-shadow:0 2px 8px rgba(0,0,0,.06);}\n.arch-node .icon{font-size:28px;margin-bottom:6px;}\n.arch-node .label{font-size:11.5px;font-weight:700;color:#1a1d2e;}\n.arch-node .sublabel{font-size:10px;color:#a0a5c0;}\n.arch-arrow{font-size:18px;color:#c0c5e0;padding:0 6px;flex-shrink:0;}\n\n/* Warning / info box */\n.info-box{border-radius:12px;padding:14px 18px;margin:14px 0;display:flex;gap:12px;align-items:flex-start;}\n.info-box .icon{font-size:18px;flex-shrink:0;margin-top:1px;}\n.info-box p{font-size:13px;line-height:1.65;}\n.info-blue{background:rgba(33,150,243,.07);border:1px solid rgba(33,150,243,.2);}\n.info-orange{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);}\n.info-green{background:rgba(0,185,107,.07);border:1px solid rgba(0,185,107,.2);}\n\n/* Cost table */\ntable{widt =\"nav-item\" href=\"#step1\">\n    <span class=\"step-num\">1<\u002Fspan> إعداد Twilio\n  <\u002Fa>\n  <a class=\"nav-item\" href=\"#step2\">\n    <span class=\"step-num\">2<\u002Fspan> OpenAI API\n  <\u002Fa>\n  <a class=\"nav-item\" href=\"#step3\">\n    <span class=\"step-num\">3<\u002Fspan> ElevenLabs TTS\n  <\u002Fa>\n  <a class=\"nav-item\" href=\"#step4\">\n    <span class=\"step-num\">4<\u002Fspan> كود السيرفر\n  <\u002Fa>\n  <a class=\"nav-item\" href=\"#step5\">\n    <span class=\"step-num\">5<\u002Fspan> ملف الإعدادات\n  <\u002Fa>\n  <a class=\"nav-item\" href=\"#step6\">\n    <span class=\"step-num\">6<\u002Fspan> النشر على Railway\n  <\u002Fa>\n  <a class=\"nav-item\" href=\"#step7\">\n    <span class=\"step-num\">7<\u002Fspan> الاختبار والتشغيل\n  <\u002Fa>\n<\u002Faside>\n\n<!-- MAIN CONTENT -->\n<main class=\"main\">\n  <div style=\"margin-bottom:40px;\">\n    <div class=\"badge badge-blue\" style=\"margin-bottom:12px;\">📋 دليل تقني شامل<\u002Fdiv>\n    <h1 class=\"heading\" style=\"font-size:30px;font-weight:900;color:#1a1d2e;margin-bottom:8px;\">خطوات الربط التقني الكامل<\u002Fh1>\n    <p style=\"font-size:15px;color:#7070a0;\">من الصفر حتى التشغيل الفعلي — زبون يتصل ونظام الذكاء الاصطناعي يرد بصوت<\u002Fp>\n    <div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:15%\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ARCH -->\n  <section class=\"section\" id=\"arch\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:rgba(33,150,243,.1);color:#2196f3;\">🗺<\u002Fdiv>\n      <div>\n        <h2>معمارية النظام الكاملة<\u002Fh2>\n        <div class=\"subtitle\">كيف تتدفق المكالمة من الزبون حتى الرد الصوتي<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\">\n      <div class=\"arch\">\n        <div class=\"arch-node\">\n          <div class=\"icon\">📞<\u002Fdiv>\n          <div class=\"label\">الزبون<\u002Fdiv>\n          <div class=\"sublabel\">يتصل برقم الهاتف<\u002Fdiv>\n d>\n          <td>أقل من 110₪/شهر<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP 1: TWILIO -->\n  <section class=\"section\" id=\"step1\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:#fee;color:#e84393;font-size:16px;\">1<\u002Fdiv>\n      <div>\n        <h2>إعداد Twilio — استقبال المكالمات<\u002Fh2>\n        <div class=\"subtitle\">احصل على رقم هاتف يستقبل المكالمات ويوجهها للنظام<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"step\">\n        <div class=\"step-dot\">1<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>إنشاء حساب Twilio<\u002Fstrong>\n          <p>روح على <a href=\"https://twilio.com\" target=\"_blank\">twilio.com<\u002Fa> وسجّل حساب مجاني — تحصل على $15 رصيد مجاني للتجربة<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">2<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>شراء رقم هاتف<\u002Fstrong>\n          <p>من Console → Phone Numbers → Buy a Number. اختر رقم يدعم Voice. التكلفة ~$1/شهر<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">3<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>احفظ بيانات الـ API<\u002Fstrong>\n          <p>من Dashboard احفظ: <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;color:#2196f3\">Account SID<\u002Fcode> و <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;color:#2196f3\">Auth Token<\u002Fcode><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">4<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>إعداد Webhook<\u002Fstrong>\n          <p>في إعدادات الرقم → Voice → Webhook URL: ضع رابط السيرفر الخاص بك (ستضيفه في الخطوة 6)<\u002Fp>\n          <p style=\"margin-top:6px;\">مثال: <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;color:#764ba2\">https://your-app.railway.app/call<\u002Fcode><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP 2: OPENAI -->\n  <section class=\"section\" id=\"step2\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:#f0f4ff;color:#2196f3;font-size:16px;\">2<\u002Fdiv>\n      <div>\n        <h2>OpenAI API — الذكاء الاصطناعي<\u002Fh2>\n        <div class=\"subtitle\">Whisper لتحويل الصوت، GPT-4 لفهم الطلب والرد<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"step\">\n        <div class=\"step-dot\">1<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>إنشاء حساب OpenAI<\u002Fstrong>\n          <p>روح على <a href=\"https://platform.openai.com\" target=\"_blank\">platform.openai.com<\u002Fa> وسجّل حساب<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">2<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>إنشاء API Key<\u002Fstrong>\n          <p>API Keys → Create new secret key. احفظ المفتاح — لن يظهر مرة ثانية!<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">3<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>شحن الرصيد<\u002Fstrong>\n          <p>Billing → Add payment method. ابدأ بـ $10 تكفيك لأشهر في البداية<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP 3: ELEVENLABS -->\n  <section class=\"section\" id=\"step3\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:rgba(0,185,107,.1);color:#00b96b;font-size:16px;\">3<\u002Fdiv>\n      <div>\n        <h2>ElevenLabs — الصوت العربي<\u002Fh2>\n        <div class=\"subtitle\">تحويل ردود الذكاء الاصطناعي لصوت بشري طبيعي<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"step\">\n        <div class=\"step-dot\">1<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>إنشاء حساب ElevenLabs<\u002Fstrong>\n          <p>روح على <a href=\"https://elevenlabs.io\" target=\"_blank\">elevenlabs.io<\u002Fa> — الخطة المجانية تعطيك 10,000 حرف/شهر<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">2<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>اختيار صوت عربي<\u002Fstrong>\n          <p>من Voice Library ابحث عن \"Arabic\" واختر صوتاً مناسباً. احفظ الـ Voice ID<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">3<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>احصل على API Key<\u002Fstrong>\n          <p>Profile Settings → API Key. انسخه واحفظه<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"info-box info-orange\">\n        <div class=\"icon\">💡<\u002Fdiv>\n        <p>بديل مجاني: يمكن استخدام <strong>OpenAI TTS<\u002Fstrong> (أرخص وجودة ممتازة للعربية) بدل ElevenLabs<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP 4: CODE -->\n  <section class=\"section\" id=\"step4\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:#f0f4ff;color:#764ba2;font-size:16px;\">4<\u002Fdiv>\n      <div>\n        <h2>كود السيرفر الكامل (Python)<\u002Fh2>\n        <div class=\"subtitle\">ملف واحد يربط كل الخدمات معاً<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"info-box info-blue\" style=\"margin-bottom:16px;\">\n      <div class=\"icon\">📦<\u002Fdiv>\n      <p>تحتاج Python 3.9+ مثبت. ثبّت المكتبات بـ: <code style=\"background:rgba(33,150,243,.1);padding:2px 8px;border-radius:5px;direction:ltr;display:inline-block\">pip install flask twilio openai elevenlabs requests<\u002Fcode><\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n      <div class=\"code-block\" style=\"margin:0;border-radius:14px;\">\n        <div class=\"code-header\">\n          <span class=\"code-lang\">PYTHON — app.py<\u002Fspan>\n          <button class=\"copy-btn\" onclick=\"copyCode(this,'code1')\">نسخ الكود<\u002Fbutton>\n        <\u002Fdiv>\n        <pre id=\"code1\"><span class=\"cm\"># ══════════════════════════════════════════════════\n# SMART VOICE RECEPTION AI — السيرفر الرئيسي\n# ══════════════════════════════════════════════════<\u002Fspan>\n\n<span class=\"kw\">import<\u002Fspan> os, tempfile, requests\n<span class=\"kw\">from<\u002Fspan> flask <span class=\"kw\">import<\u002Fspan> Flask, request, Response\n<span class=\"kw\">from<\u002Fspan> twilio.twiml.voice_response <span class=\"kw\">import<\u002Fspan> VoiceResponse, Gather\n<span class=\"kw\">from<\u002Fspan> openai <span class=\"kw\">import<\u002Fspan> OpenAI\n\napp = <span class=\"fn\">Flask<\u002Fspan>(__name__)\nclient = <span class=\"fn\">OpenAI<\u002Fspan>(api_key=os.environ[<span class=\"st\">\"OPENAI_API_KEY\"<\u002Fspan>])\n\n<span class=\"cm\"># ── إعدادات المطعم ──────────────────────────────────<\u002Fspan>\nRESTAURANT_PROMPT = <span class=\"st\">\"\"\"\nأنت مساعد صوتي ذكي لمطعم \"الزيتون الذهبي\".\n- تتحدث بالعربية فقط\n- أسلوبك ودود ومهذب\n- تستقبل طلبات التوصيل والاستفسارات\n- المنيو: شاورما 14₪، فلافل 8₪، مندي 35₪، برغر 20₪\n- التوصيل مجاني للطلبات فوق 30₪، وإلا 5₪\n- وقت التوصيل 45-60 دقيقة\n- إذا بدا الزبون مستاءً، أعطه خصم 10% تلقائياً\n- اسأل دائماً: الطلب، العنوان، رقم الهاتف\n\"\"\"<\u002Fspan>\n\nconversation_history = {}\n\n<span class=\"cm\"># ── استقبال المكالمة ────────────────────────────────<\u002Fspan>\n<span class=\"var\">@app<\u002Fspan>.route(<span class=\"st\">\"/call\"<\u002Fspan>, methods=[<span class=\"st\">\"POST\"<\u002Fspan>])\n<span class=\"kw\">def<\u002Fspan> <span class=\"fn\">handle_call<\u002Fspan>():\n    call_sid = request.form.get(<span class=\"st\">\"CallSid\"<\u002Fspan>)\n    conversation_history[call_sid] = []\n    \n    resp = <span class=\"fn\">VoiceResponse<\u002Fspan>()\n    gather = <span class=\"fn\">Gather<\u002Fspan>(\n        input=<span class=\"st\">\"speech\"<\u002Fspan>,\n        action=<span class=\"st\">\"/process\"<\u002Fspan>,\n        language=<span class=\"st\">\"ar-SA\"<\u002Fspan>,\n        speech_timeout=<span class=\"st\">\"auto\"<\u002Fspan>,\n        enhanced=<span class=\"st\">\"true\"<\u002Fspan>\n    )\n    <span class=\"cm\"># ترحيب أولي<\u002Fspan>\n    audio_url = <span class=\"fn\">text_to_speech<\u002Fspan>(<span class=\"st\">\"أهلاً وسهلاً، مطعم الزيتون الذهبي. كيف أقدر أساعدك؟\"<\u002Fspan>)\n    gather.play(audio_url)\n    resp.append(gather)\n    <span class=\"kw\">return<\u002Fspan> <span class=\"fn\">Response<\u002Fspan>(str(resp), mimetype=<span class=\"st\">\"text/xml\"<\u002Fspan>)\n\n<span class=\"cm\"># ── معالجة كلام الزبون ──────────────────────────────<\u002Fspan>\n<span class=\"var\">@app<\u002Fspan>.route(<span class=\"st\">\"/process\"<\u002Fspan>, methods=[<span class=\"st\">\"POST\"<\u002Fspan>])\n<span class=\"kw\">def<\u002Fspan> <span class=\"fn\">process_speech<\u002Fspan>():\n    call_sid = request.form.get(<span class=\"st\">\"CallSid\"<\u002Fspan>)\n    speech_text = request.form.get(<span class=\"st\">\"SpeechResult\"<\u002Fspan>, <span class=\"st\">\"\"<\u002Fspan>)\n    \n    <span class=\"kw\">if not<\u002Fspan> speech_text:\n        <span class=\"kw\">return<\u002Fspan> <span class=\"fn\">repeat_gather<\u002Fspan>(<span class=\"st\">\"لم أفهم، ممكن تعيد؟\"<\u002Fspan>)\n    \n    <span class=\"cm\"># أضف كلام الزبون للتاريخ<\u002Fspan>\n    history = conversation_history.get(call_sid, [])\n    history.append({<span class=\"st\">\"role\"<\u002Fspan>: <span class=\"st\">\"user\"<\u002Fspan>, <span class=\"st\">\"content\"<\u002Fspan>: speech_text})\n    \n    <span class=\"cm\"># احصل على رد GPT-4<\u002Fspan>\n    ai_response = <span class=\"fn\">get_ai_response<\u002Fspan>(history)\n    history.append({<span class=\"st\">\"role\"<\u002Fspan>: <span class=\"st\">\"assistant\"<\u002Fspan>, <span class=\"st\">\"content\"<\u002Fspan>: ai_response})\n    conversation_history[call_sid] = history\n    \n    <span class=\"cm\"># حوّل الرد لصوت وشغّله<\u002Fspan>\n    audio_url = <span class=\"fn\">text_to_speech<\u002Fspan>(ai_response)\n    resp = <span class=\"fn\">VoiceResponse<\u002Fspan>()\n    \n    <span class=\"cm\"># إذا انتهى الطلب<\u002Fspan>\n    <span class=\"kw\">if<\u002Fspan> <span class=\"st\">\"شكراً\"<\u002Fspan> <span class=\"kw\">in<\u002Fspan> ai_response <span class=\"kw\">or<\u002Fspan> <span class=\"st\">\"مع السلامة\"<\u002Fspan> <span class=\"kw\">in<\u002Fspan> ai_response:\n        resp.play(audio_url)\n        resp.hangup()\n    <span class=\"kw\">else<\u002Fspan>:\n        gather = <span class=\"fn\">Gather<\u002Fspan>(input=<span class=\"st\">\"speech\"<\u002Fspan>, action=<span class=\"st\">\"/process\"<\u002Fspan>,\n                         language=<span class=\"st\">\"ar-SA\"<\u002Fspan>, speech_timeout=<span class=\"st\">\"auto\"<\u002Fspan>)\n        gather.play(audio_url)\n        resp.append(gather)\n    \n    <span class=\"kw\">return<\u002Fspan> <span class=\"fn\">Response<\u002Fspan>(str(resp), mimetype=<span class=\"st\">\"text/xml\"<\u002Fspan>)\n\n<span class=\"cm\"># ── GPT-4 ────────────────────────────────────────────<\u002Fspan>\n<span class=\"kw\">def<\u002Fspan> <span class=\"fn\">get_ai_response<\u002Fspan>(history):\n    messages = [{<span class=\"st\">\"role\"<\u002Fspan>: <span class=\"st\">\"system\"<\u002Fspan>, <span class=\"st\">\"content\"<\u002Fspan>: RESTAURANT_PROMPT}] + history\n    response = client.chat.completions.<span class=\"fn\">create<\u002Fspan>(\n        model=<span class=\"st\">\"gpt-4o\"<\u002Fspan>,\n        messages=messages,\n        max_tokens=<span class=\"num\">200<\u002Fspan>,\n        temperature=<span class=\"num\">0.7<\u002Fspan>\n    )\n    <span class=\"kw\">return<\u002Fspan> response.choices[<span class=\"num\">0<\u002Fspan>].message.content\n\n<span class=\"cm\"># ── ElevenLabs TTS ──────────────────────────────────<\u002Fspan>\n<span class=\"kw\">def<\u002Fspan> <span class=\"fn\">text_to_speech<\u002Fspan>(text):\n    VOICE_ID = os.environ.get(<span class=\"st\">\"ELEVENLABS_VOICE_ID\"<\u002Fspan>, <span class=\"st\">\"YOUR_VOICE_ID\"<\u002Fspan>)\n    API_KEY  = os.environ[<span class=\"st\">\"ELEVENLABS_API_KEY\"<\u002Fspan>]\n    \n    response = requests.<span class=\"fn\">post<\u002Fspan>(\n        f<span class=\"st\">\"https://api.elevenlabs.io/v1/text-to-speech/{VOICE_ID}\"<\u002Fspan>,\n        headers={<span class=\"st\">\"xi-api-key\"<\u002Fspan>: API_KEY, <span class=\"st\">\"Content-Type\"<\u002Fspan>: <span class=\"st\">\"application/json\"<\u002Fspan>},\n        json={\n            <span class=\"st\">\"text\"<\u002Fspan>: text,\n            <span class=\"st\">\"model_id\"<\u002Fspan>: <span class=\"st\">\"eleven_multilingual_v2\"<\u002Fspan>,\n            <span class=\"st\">\"voice_settings\"<\u002Fspan>: {<span class=\"st\">\"stability\"<\u002Fspan>: <span class=\"num\">0.5<\u002Fspan>, <span class=\"st\">\"similarity_boost\"<\u002Fspan>: <span class=\"num\">0.8<\u002Fspan>}\n        }\n    )\n    <span class=\"cm\"># احفظ الملف الصوتي مؤقتاً وارجع رابطه<\u002Fspan>\n    tmp = tempfile.<span class=\"fn\">NamedTemporaryFile<\u002Fspan>(delete=<span class=\"kw\">False<\u002Fspan>, suffix=<span class=\"st\">\".mp3\"<\u002Fspan>, dir=<span class=\"st\">\"static\"<\u002Fspan>)\n    tmp.<span class=\"fn\">write<\u002Fspan>(response.content)\n    tmp.<span class=\"fn\">close<\u002Fspan>()\n    base_url = os.environ.get(<span class=\"st\">\"BASE_URL\"<\u002Fspan>, <span class=\"st\">\"http://localhost:5000\"<\u002Fspan>)\n    <span class=\"kw\">return<\u002Fspan> f<span class=\"st\">\"{base_url}/static/{os.path.basename(tmp.name)}\"<\u002Fspan>\n\n<span class=\"kw\">def<\u002Fspan> <span class=\"fn\">repeat_gather<\u002Fspan>(msg):\n    audio_url = <span class=\"fn\">text_to_speech<\u002Fspan>(msg)\n    resp = <span class=\"fn\">VoiceResponse<\u002Fspan>()\n    gather = <span class=\"fn\">Gather<\u002Fspan>(input=<span class=\"st\">\"speech\"<\u002Fspan>, action=<span class=\"st\">\"/process\"<\u002Fspan>, language=<span class=\"st\">\"ar-SA\"<\u002Fspan>)\n    gather.<span class=\"fn\">play<\u002Fspan>(audio_url)\n    resp.<span class=\"fn\">append<\u002Fspan>(gather)\n    <span class=\"kw\">return<\u002Fspan> <span class=\"fn\">Response<\u002Fspan>(str(resp), mimetype=<span class=\"st\">\"text/xml\"<\u002Fspan>)\n\n<span class=\"kw\">if<\u002Fspan> __name__ == <span class=\"st\">\"__main__\"<\u002Fspan>:\n    os.<span class=\"fn\">makedirs<\u002Fspan>(<span class=\"st\">\"static\"<\u002Fspan>, exist_ok=<span class=\"kw\">True<\u002Fspan>)\n    app.<span class=\"fn\">run<\u002Fspan>(host=<span class=\"st\">\"0.0.0.0\"<\u002Fspan>, port=<span class=\"num\">5000<\u002Fspan>, debug=<span class=\"kw\">False<\u002Fspan>)<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP 5: ENV FILE -->\n  <section class=\"section\" id=\"step5\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:rgba(245,158,11,.1);color:#f59e0b;font-size:16px;\">5<\u002Fdiv>\n      <div>\n        <h2>ملف الإعدادات (.env)<\u002Fh2>\n        <div class=\"subtitle\">ضع مفاتيح الـ API الخاصة بك هنا<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n      <div class=\"code-block\" style=\"margin:0;border-radius:14px;\">\n        <div class=\"code-header\">\n          <span class=\"code-lang\">ENV FILE — .env<\u002Fspan>\n          <button class=\"copy-btn\" onclick=\"copyCode(this,'code2')\">نسخ<\u002Fbutton>\n        <\u002Fdiv>\n        <pre id=\"code2\"><span class=\"cm\"># ── OpenAI ──────────────────────────────────────<\u002Fspan>\n<span class=\"var\">OPENAI_API_KEY<\u002Fspan>=sk-proj-xxxxxxxxxxxxxxxxxxxxxxxx\n\n<span class=\"cm\"># ── ElevenLabs ──────────────────────────────────<\u002Fspan>\n<span class=\"var\">ELEVENLABS_API_KEY<\u002Fspan>=xxxxxxxxxxxxxxxxxxxxxxxx\n<span class=\"var\">ELEVENLABS_VOICE_ID<\u002Fspan>=xxxxxxxxxxxxxxxxxxx\n\n<span class=\"cm\"># ── Twilio ──────────────────────────────────────<\u002Fspan>\n<span class=\"var\">TWILIO_ACCOUNT_SID<\u002Fspan>=ACxxxxxxxxxxxxxxxxxxxxxxxx\n<span class=\"var\">TWILIO_AUTH_TOKEN<\u002Fspan>=xxxxxxxxxxxxxxxxxxxxxxxx\n<span class=\"var\">TWILIO_PHONE_NUMBER<\u002Fspan>=+1XXXXXXXXXX\n\n<span class=\"cm\"># ── السيرفر ──────────────────────────────────────<\u002Fspan>\n<span class=\"var\">BASE_URL<\u002Fspan>=https://your-app.railway.app<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"padding:0;overflow:hidden;margin-top:14px;\">\n      <div class=\"code-block\" style=\"margin:0;border-radius:14px;\">\n        <div class=\"code-header\">\n          <span class=\"code-lang\">TEXT — requirements.txt<\u002Fspan>\n          <button class=\"copy-btn\" onclick=\"copyCode(this,'code3')\">نسخ<\u002Fbutton>\n        <\u002Fdiv>\n        <pre id=\"code3\">flask==3.0.0\ntwilio==9.0.0\nopenai==1.35.0\nelevenlabs==1.2.0\nrequests==2.31.0\ngunicorn==21.2.0<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP 6: DEPLOY -->\n  <section class=\"section\" id=\"step6\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:rgba(118,75,162,.1);color:#764ba2;font-size:16px;\">6<\u002Fdiv>\n      <div>\n        <h2>النشر على Railway (أسهل طريقة)<\u002Fh2>\n        <div class=\"subtitle\">سيرفر دائم التشغيل بـ ~$5/شهر<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"step\">\n        <div class=\"step-dot\">1<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>ارفع الكود على GitHub<\u002Fstrong>\n          <p>أنشئ Repo جديد على <a href=\"https://github.com\" target=\"_blank\">github.com<\u002Fa> وارفع الملفات: <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;\">app.py<\u002Fcode> و <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;\">requirements.txt<\u002Fcode> و <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;\">.env<\u002Fcode><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">2<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>أنشئ مشروع على Railway<\u002Fstrong>\n          <p>روح على <a href=\"https://railway.app\" target=\"_blank\">railway.app<\u002Fa> → New Project → Deploy from GitHub → اختر الـ Repo<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">3<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>أضف متغيرات البيئة<\u002Fstrong>\n          <p>Variables → أضف كل مفاتيح الـ API من ملف .env واحداً واحداً<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">4<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>احصل على رابط السيرفر<\u002Fstrong>\n          <p>Settings → Generate Domain → ستحصل على رابط مثل <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;color:#764ba2\">https://smart-voice.railway.app<\u002Fcode><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">5<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>ربط Twilio بالسيرفر<\u002Fstrong>\n          <p>روح لـ Twilio → Phone Numbers → رقمك → Voice Webhook: <code style=\"background:#f4f6fb;padding:2px 7px;border-radius:5px;color:#2196f3\">https://smart-voice.railway.app/call<\u002Fcode><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STEP 7: TEST -->\n  <section class=\"section\" id=\"step7\">\n    <div class=\"section-header\">\n      <div class=\"step-badge\" style=\"background:rgba(0,185,107,.1);color:#00b96b;font-size:16px;\">7<\u002Fdiv>\n      <div>\n        <h2>الاختبار والتشغيل ✅<\u002Fh2>\n        <div class=\"subtitle\">تأكد إن كل شيء يعمل قبل إعطاء الرقم للزبائن<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"step\">\n        <div class=\"step-dot\">✓<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>تشغيل محلي أولاً (للتطوير)<\u002Fstrong>\n          <div class=\"code-block\" style=\"margin:8px 0;\">\n            <pre style=\"padding:12px 16px;font-size:12px;\"><span class=\"cm\"># في Terminal<\u002Fspan>\n<span class=\"kw\">pip install<\u002Fspan> -r requirements.txt\n<span class=\"kw\">python<\u002Fspan> app.py\n\n<span class=\"cm\"># في Terminal ثاني — اكشف السيرفر للإنترنت<\u002Fspan>\n<span class=\"kw\">ngrok http<\u002Fspan> 5000\n<span class=\"cm\"># انسخ الرابط وضعه في Twilio للتجربة<\u002Fspan><\u002Fpre>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-dot\">✓<\u002Fdiv>\n        <div class=\"step-body\">\n          <strong>اتصل على الرقم وجرّب<\u002Fstrong>\n          <p>اتصل على رقم Twilio من هاتفك، قل \"بدي أطلب شاورما\" وانتظر الرد الصوتي 🎉<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"info-box info-green\">\n        <div class=\"icon\">🎉<\u002Fdiv>\n        <p><strong>تهانينا!<\u002Fstrong> إذا سمعت الرد الصوتي، نظامك يعمل بنجاح. الآن خصّص الـ RESTAURANT_PROMPT بمنيو مطعمك الحقيقي وأسعاره<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Quick checklist -->\n    <div class=\"card\" style=\"margin-top:16px;\">\n      <div class=\"card-title\" style=\"color:#2196f3;\"><span>✅<\u002Fspan> قائمة التحقق النهائية<\u002Fdiv>\n      <div id=\"checklist\" style=\"display:flex;flex-direction:column;gap:10px;\">\n        {['حساب Twilio + رقم هاتف','مفتاح OpenAI API + رصيد','مفتاح ElevenLabs + Voice ID','ملف app.py جاهز','ملف .env بكل المفاتيح','السيرفر منشور على Railway','Webhook مضبوط في Twilio'].map((item,i)=&gt;`\n        <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;border-radius:9px;border:1px solid #e8eaf0;font-size:13.5px;color:#1a1d2e;\" onclick=\"this.style.background=this.style.background?'':'rgba(0,185,107,.06)';this.querySelector('input').checked=!this.querySelector('input').checked;\">\n          <input type=\"checkbox\" style=\"accent-color:#00b96b;width:16px;height:16px;\"> ${item}\n        <\u002Flabel>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"text-align:center;padding:40px 0;color:#a0a5c0;font-size:13px;\">\n    SMART VOICE RECEPTION AI — دليل الإعداد الكامل · 2026\n  <\u002Fdiv>\n<\u002Fmain>\n\n<script>\n// Smooth scroll for nav\ndocument.querySelectorAll('.nav-item').forEach(link => {\n  link.addEventListener('click', e => {\n    e.preventDefault();\n    const target = document.querySelector(link.getAttribute('href'));\n    if(target) target.scrollIntoView({behavior:'smooth',block:'start'});\n    document.querySelectorAll('.nav-item').forEach(l=>l.classList.remove('active'));\n    link.classList.add('active');\n  });\n});\n\n// Copy code\nfunction copyCode(btn, id) {\n  const code = document.getElementById(id).innerText;\n  navigator.clipboard.writeText(code).then(()=>{\n    btn.textContent = '✓ تم النسخ';\n    btn.classList.add('copied');\n    setTimeout(()=>{btn.textContent='نسخ';btn.classList.remove('copied');},2000);\n  });\n}\n\n// Active section on scroll\nconst sections = document.querySelectorAll('.section');\nconst navItems = document.querySelectorAll('.nav-item[href^=\"#\"]');\nwindow.addEventListener('scroll', ()=>{\n  let current='';\n  sections.forEach(s=>{if(window.scrollY>=s.offsetTop-100) current='#'+s.id;});\n  navItems.forEach(n=>{\n    n.classList.remove('active');\n    if(n.getAttribute('href')===current) n.classList.add('active');\n  });\n});\n\n// Checklist items from the template string\ndocument.getElementById('checklist').innerHTML = [\n  'حساب Twilio + رقم هاتف',\n  'مفتاح OpenAI API + رصيد',\n  'مفتاح ElevenLabs + Voice ID',\n  'ملف app.py جاهز',\n  'ملف .env بكل المفاتيح',\n  'السيرفر منشور على Railway',\n  'Webhook مضبوط في Twilio'\n].map(item=>`\n  <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 13px;border-radius:9px;border:1px solid #e8eaf0;font-size:13.5px;color:#1a1d2e;transition:all .2s;\" class=\"checklist-item\">\n    <input type=\"checkbox\" style=\"accent-color:#00b96b;width:16px;height:16px;\"> ${item}\n  <\u002Flabel>`).join('');\n\ndocument.querySelectorAll('.checklist-item').forEach(el=>{\n  el.addEventListener('click',()=>{\n    const checked = el.querySelector('input').checked;\n    el.style.background = checked ? 'rgba(0,185,107,.07)' : '';\n    el.style.borderColor = checked ? 'rgba(0,185,107,.3)' : '#e8eaf0';\n  });\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
